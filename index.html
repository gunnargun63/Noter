<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noter til fysik B i gymnasiet</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Exo+2:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:        #0a0e17;
      --card-bg:   #111927;
      --border:    #1a2e45;
      --accent:    #00d4e8;
      --text:      #c8dce8;
      --text-dim:  #5a7a90;
      --text-head: #e8f4f8;
      --glow:      0 0 16px rgba(0,212,232,0.25);
    }
    body.light {
      --bg:        #f0f4f8;
      --card-bg:   #ffffff;
      --border:    #b0c8dc;
      --accent:    #007890;
      --text:      #1a3040;
      --text-dim:  #6a8a9a;
      --text-head: #0a1820;
      --glow:      0 0 16px rgba(0,120,144,0.15);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Exo 2', sans-serif;
      font-weight: 300;
      min-height: 100vh;
      transition: background 0.3s, color 0.3s;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.25;
      pointer-events: none;
      z-index: 0;
    }
    .container {
      position: relative;
      z-index: 1;
      max-width: 860px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 40px;
    }
    .back-link {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      color: var(--text-dim);
      text-decoration: none;
      transition: color 0.2s;
    }
    .back-link:hover { color: var(--accent); }
    .back-link::before { content: '← '; }
    .toggle-btn {
      background: var(--card-bg);
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.78rem;
      letter-spacing: 0.08em;
      padding: 6px 14px;
      cursor: pointer;
      border-radius: 3px;
      transition: border-color 0.2s, color 0.2s;
    }
    .toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
    header { margin-bottom: 48px; }
    .label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 16px;
    }
    .label::before { content: '{ '; }
    .label::after  { content: ' }'; }
    h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem);
      font-weight: 700;
      color: var(--text-head);
      line-height: 1.15;
      letter-spacing: -0.01em;
      margin-bottom: 20px;
    }
    h1 span { color: var(--accent); }
    .divider {
      height: 1px;
      background: linear-gradient(90deg, var(--accent) 0%, transparent 60%);
      margin-bottom: 20px;
      opacity: 0.5;
    }
    .subtitle {
      font-size: 1rem;
      color: var(--text);
      line-height: 1.7;
      max-width: 580px;
      opacity: 0.85;
    }
    .section-title {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin: 40px 0 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .section-title::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Compact card */
    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      padding: 13px 18px;
      margin-bottom: 8px;
      text-decoration: none;
      border-radius: 2px;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
      animation: fadeUp 0.4s ease both;
    }
    .card:nth-child(1)  { animation-delay: 0.04s; }
    .card:nth-child(2)  { animation-delay: 0.08s; }
    .card:nth-child(3)  { animation-delay: 0.12s; }
    .card:nth-child(4)  { animation-delay: 0.16s; }
    .card:nth-child(5)  { animation-delay: 0.20s; }
    .card:nth-child(6)  { animation-delay: 0.24s; }
    .card:nth-child(7)  { animation-delay: 0.28s; }
    .card:nth-child(8)  { animation-delay: 0.32s; }
    .card:nth-child(9)  { animation-delay: 0.36s; }
    .card:nth-child(10) { animation-delay: 0.40s; }
    .card:hover {
      border-color: var(--accent);
      box-shadow: var(--glow);
      transform: translateX(4px);
    }
    .card-icon {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.95rem;
      color: var(--accent);
      opacity: 0.55;
      flex-shrink: 0;
    }
    .card-title {
      flex: 1;
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--text-head);
    }
    .card-meta {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.68rem;
      color: var(--text-dim);
      letter-spacing: 0.06em;
      flex-shrink: 0;
    }
    .card-arrow {
      font-family: 'Share Tech Mono', monospace;
      color: var(--accent);
      opacity: 0;
      transition: opacity 0.2s, transform 0.2s;
      transform: translateX(4px);
      flex-shrink: 0;
      margin-left: 8px;
    }
    .card:hover .card-arrow {
      opacity: 1;
      transform: translateX(0);
    }
    footer {
      margin-top: 64px;
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--text-dim);
      letter-spacing: 0.08em;
      border-top: 1px solid var(--border);
      padding-top: 20px;
    }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <a class="back-link" href="https://gunnargun63.github.io/">Forside</a>
    <button class="toggle-btn" onclick="document.body.classList.toggle('light');this.textContent=document.body.classList.contains('light')?'◐ MØrk':'◑ LYS'">◑ LYS</button>
  </div>

  <header>
    <p class="label">Noter</p>
    <h1>Noter til<br><span>fysik B i gymnasiet</span></h1>
    <div class="divider"></div>
    <p class="subtitle">Faglige noter til fysik B i gymnasiet som PDF.</p>
  </header>

  <p class="section-title">Emner</p>

  <a class="card" href="Note - Varmelære.pdf" target="_blank">
    <div class="card-icon">≡</div>
    <div class="card-title">Varmelære</div>
    <div class="card-meta">PDF</div>
    <div class="card-arrow">→</div>
  </a>

<a class="card" href="Note - Atomfysik.pdf" target="_blank">
    <div class="card-icon">≡</div>
    <div class="card-title">Atomfysik</div>
    <div class="card-meta">PDF</div>
    <div class="card-arrow">→</div>
  </a>
  
  <a class="card" href="Note - Strålingslovene.pdf" target="_blank">
    <div class="card-icon">≡</div>
    <div class="card-title">Strålingslovene</div>
    <div class="card-meta">PDF</div>
    <div class="card-arrow">→</div>
  </a>

  <footer>Gunnar Gunnarsson</footer>

</div>
</body>
</html>
